<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WVB Engineering | Binnenkort online</title>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", sans-serif;
        background: #f7fbff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: white;
      }

      .card {
        position: relative;
        width: 100%;
        max-width: 1200px;
        background: #2a276a;
        border-radius: 20px;
        padding: 80px 60px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      }

      .label {
        /* letter-spacing: 6px; */
        font-size: 18px;
        margin-bottom: 20px;
        opacity: 0.9;
      }

      .logo {
        margin-bottom: 10px;
      }

      .logo img {
        max-width: 400px;
        height: auto;
      }

      .title {
        font-size: 42px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 25px;
      }

      .text {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 30px;
        max-width: 520px;
      }

      .contact {
        font-size: 18px;
        margin-bottom: 30px;
      }

      .contact strong {
        font-weight: 800;
      }

      .button {
        display: inline-block;
        background: #6ea4dc;
        color: white;
        text-decoration: none;
        padding: 14px 26px;
        border-radius: 8px;
        font-weight: 800;
        transition: 0.2s;
      }

      .button:hover {
        background: #82b6ea;
      }

      .slogan {
        margin-top: 60px;
        font-size: 28px;
        font-weight: 500;
        line-height: 1.2;
        position: absolute;
        right: 60px;
        bottom: 60px;
        text-align: right;
        font-size: 28px;
        line-height: 1.2;
      }

      @media (max-width: 768px) {
        .card {
          padding: 40px 25px;
        }

        .title {
          font-size: 32px;
        }

        .text,
        .contact {
          font-size: 16px;
        }

        @media (max-width: 768px) {
          .card {
            padding: 40px 25px;
          }

          /* 🔥 LOGO KLEINER OP MOBIEL */
          .logo img {
            max-width: 180px;
          }

          .title {
            font-size: 30px;
          }

          .text,
          .contact {
            font-size: 16px;
          }

          /* 🔥 SLOGAN NAAR BENEDEN */
          .slogan {
            position: static;
            margin-top: 40px;
            text-align: left;
            font-size: 20px;
          }
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="label">Binnenkort online</div>

      <div class="logo">
        <img src="logo.png" alt="WVB Engineering logo" />
      </div>

      <div class="text">
        Wij werken aan een nieuwe website om onze projecten en expertise beter
        te laten zien.<br />
        Heeft u in de tussentijd een vraag of project?
      </div>

      <div class="contact">
        Neem gerust contact op.<br />
        <strong>E-mail: info@wvbengineering.nl</strong>
      </div>

      <a class="button" href="mailto:info@wvbengineering.nl">
        MAIL ONS DIRECT
      </a>

      <div class="slogan">
        WE DESIGN<br />
        WE BUILD<br />
        WE SERVICE
      </div>
    </div>
  </body>
</html>
